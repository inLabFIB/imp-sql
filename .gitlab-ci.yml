image: maven:3-openjdk-17-slim
cache:
  paths:
    - .m2/repository
  key: maven-cache

variables:
  MAVEN_CLI_OPTS: "-s ci_settings.xml --batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

stages:
  - environment
  - test
  - build
  - deploy

environment:test-db:
  stage: environment
  only:
    changes:
      - Dockerfile
      - docker/**
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    IMAGE_TAG: $NEXUS_REGISTRY/imp-sql/db:latest
  script:
    - cat "$DOCKER_AUTH_CONFIG" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE_TAG}"

test:unit:
  stage: test
  script:
    - mvn clean test -U $MAVEN_CLI_OPTS
  artifacts:
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml

test:integration:
  stage: test
  variables:
    SQL_DB_HOST: 'db'
    ACCEPT_EULA: Y
    SA_PASSWORD: PasswordO1.
  services:
    - name: $NEXUS_REGISTRY/imp-sql/db:latest
      alias: db
  script:
    - sleep 20
    - mvn -am verify -U $MAVEN_CLI_OPTS
  artifacts:
    reports:
      junit:
        - target/failsafe-reports/TEST-*.xml

deploy:release:
  stage: deploy
  only:
    - master
    - develop
  script:
    - mvn deploy -DskipTests -U $MAVEN_CLI_OPTS
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
