version: "3.1"

services:
  sqlserver:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: PasswordO1.
    volumes:
      - db_data:/var/opt/mssql
      - ./sql/setup.sql:/usr/src/app/sql/setup.sql

volumes:
  db_data:
